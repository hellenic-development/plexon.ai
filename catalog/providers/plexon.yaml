name: plexon
display_name: Plexon
compatibility: anthropic
default_model: plexon-1.0
models:
    - id: plexon-1.0
      name: Plexon 1.0
      limit: 1000000
      # M3 (the model Plexon resolves to) has a 1M context. 128000 output
      # tokens fits a one-shot ~200 KB file write (~57K tokens) PLUS reasoning
      # headroom. 8192 capped single writes at ~30 KB and forced append-chunking.
      reserved_tokens: 128000
      supports_streaming: true
      default_selection: true
      pricing:
        is_subscription: true
    - id: plexon-1.0-image
      name: Plexon 1.0 Image
      limit: 0
      reserved_tokens: 0
      supports_streaming: true
      supports_image: true
      supports_image_generation: true
      generation_type: sync
      pricing:
        is_subscription: true
    - id: plexon-1.0-video
      name: Plexon 1.0 Video
      limit: 0
      reserved_tokens: 0
      supports_streaming: true
      supports_image: true
      supports_video_generation: true
      generation_type: async
      pricing:
        is_subscription: true

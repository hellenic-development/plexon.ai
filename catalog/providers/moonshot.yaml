name: moonshot
display_name: Moonshot AI
compatibility: openai
requires_api_key: true
supports_web_search: true
base_url: https://api.moonshot.ai/v1
default_model: kimi-for-coding
builtin_tools:
    web_search: []
models:
    - id: kimi-for-coding
      name: Kimi For Coding
      base_url: https://api.kimi.com/coding/v1
      headers:
        HTTP-Referer: https://plexon.ai
        User-Agent: Kilo-Code/7.2.26
        X-PlexonAI-Version: 4.110.0
        X-Stainless-Runtime: node
        X-Stainless-Runtime-Version: v22.19.0
        X-Title: Plexon AI
      limit: 262144
      reserved_tokens: 32768
      supports_streaming: true
      supports_image: true
      supports_reasoning: true
      supports_include_reasoning: true
      default_selection: true
      pricing:
        is_subscription: true
    - id: kimi-k3
      name: Kimi K3
      limit: 1048576
      reserved_tokens: 32768
      supports_streaming: true
      supports_image: true
      supports_reasoning: true
      supports_include_reasoning: true
      release_date: "2026-07-16"
      pricing:
        input: 3
        output: 15
        cache_read: 0.3
    - id: kimi-k3-coding-plan
      # Wire id per kimi.com/code docs: API requests and third-party tools use
      # plain "k3" ("k3[1m]" is a Claude Code env-var-only 1M-context alias).
      wire_id: k3
      name: Kimi K3 (Subscription)
      # Anthropic-compat, on purpose: the premium->pro fallback re-resolves an
      # exhausted Kimi to MiniMax M3 (Anthropic-based), so keeping Kimi on the
      # SAME protocol keeps a premium session coherent across the fallback and
      # continuation (an OpenAI-shaped history served to an Anthropic model
      # breaks). The coding plan's Anthropic surface is on the CODING host
      # (api.kimi.com/coding, its ANTHROPIC_BASE_URL) + /v1/messages, NOT the
      # pay-as-you-go platform (api.moonshot.ai/anthropic, which 401s a
      # coding-plan key). Our anthropic client appends "/messages", so the base
      # carries /v1. Auth is Authorization: Bearer, sent by setAnthropicAuth.
      # (OpenAI variant of this same host/path works: /coding/v1/chat/completions.)
      compatibility: anthropic
      base_url: https://api.kimi.com/coding/v1
      headers:
        HTTP-Referer: https://plexon.ai
        User-Agent: Kilo-Code/7.2.26
        X-PlexonAI-Version: 4.110.0
        X-Stainless-Runtime: node
        X-Stainless-Runtime-Version: v22.19.0
        X-Title: Plexon AI
      # 1M context window (Allegretto plan and above; plain "k3" grants the
      # plan's full window on the API, the "[1m]" suffix is Claude-Code-only).
      # Held at a round 1,000,000 to match MiniMax M3 exactly. The two back the
      # premium and pro text cells and the premium->pro fallback re-resolves
      # between them mid-session, so identical windows mean a conversation that
      # fits one always fits the other: a downgrade can never land on a
      # context-length rejection.
      limit: 1000000
      reserved_tokens: 32768
      supports_streaming: true
      supports_image: true
      supports_reasoning: true
      supports_include_reasoning: true
      pricing:
        is_subscription: true
sync:
    family_strip: -k\d+(?:\.\d+)?
    pinned:
        - kimi-k3
        - kimi-k3-coding-plan
    excluded:
        - kimi-k2.6
        - kimi-k2-thinking
        - kimi-k2-thinking-turbo
        - kimi-k2-turbo

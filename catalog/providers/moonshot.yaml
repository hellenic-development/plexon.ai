name: moonshot
display_name: Moonshot AI
compatibility: openai
requires_api_key: true
supports_web_search: true
base_url: https://api.moonshot.ai/v1
default_model: kimi-for-coding
builtin_tools:
    web_search: []
models:
    - id: kimi-for-coding
      name: Kimi For Coding
      base_url: https://api.kimi.com/coding/v1
      headers:
        HTTP-Referer: https://plexon.ai
        User-Agent: Kilo-Code/4.110.0
        X-PlexonAI-Version: 4.110.0
        X-Stainless-Runtime: node
        X-Stainless-Runtime-Version: v22.19.0
        X-Title: Plexon AI
      limit: 262144
      reserved_tokens: 32768
      supports_streaming: true
      supports_image: true
      supports_reasoning: true
      supports_include_reasoning: true
      default_selection: true
      pricing:
        is_subscription: true
    - id: kimi-k2.6
      name: Kimi K2.6
      limit: 262144
      reserved_tokens: 32768
      supports_streaming: true
      supports_image: true
      supports_reasoning: true
      supports_include_reasoning: true
      pricing:
        input: 0.6
        output: 2.5
        cache_write: 0.6
        cache_read: 0.15
sync:
    family_strip: -k\d+(?:\.\d+)?
    pinned:
        - kimi-k2.6
    excluded:
        - kimi-k2-thinking
        - kimi-k2-thinking-turbo
        - kimi-k2-turbo

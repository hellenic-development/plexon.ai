name: minimax
display_name: MiniMax
compatibility: anthropic
requires_api_key: true
base_url: https://api.minimax.io/anthropic/v1
default_model: minimax-m3-coding-plan
models:
    - id: hailuo-2.3
      name: MiniMax Hailuo-2.3
      base_url: https://api.minimax.io/v1
      limit: 0
      reserved_tokens: 0
      supports_streaming: true
      supports_image: true
      supports_video_generation: true
      generation_type: async
      per_unit_cost: 0.21
      pricing: {}
    - id: hailuo-2.3-coding-plan
      # Coding Plan entries carry an internal "-coding-plan" suffix for key-pool
      # labelling, but the upstream MiniMax API only knows the bare model id.
      # PricingModel.APIModel() returns wire_id when set, so the actual upstream
      # request body's `model` field is "hailuo-2.3", not the catalog id.
      wire_id: hailuo-2.3
      name: MiniMax Hailuo-2.3 (Subscription)
      base_url: https://api.minimax.io/v1
      limit: 0
      reserved_tokens: 0
      supports_streaming: true
      supports_image: true
      supports_video_generation: true
      generation_type: async
      pricing:
        is_subscription: true
    - id: image-01
      name: MiniMax Image-01
      base_url: https://api.minimax.io/v1
      limit: 0
      reserved_tokens: 0
      supports_streaming: true
      supports_image_generation: true
      generation_type: sync
      per_unit_cost: 0.02
      pricing: {}
    - id: image-01-coding-plan
      # See the wire_id comment on hailuo-2.3-coding-plan above — same reason
      # applies here. MiniMax rejects "image-01-coding-plan" with "unsupported
      # model"; the actual upstream id is just "image-01".
      wire_id: image-01
      name: MiniMax Image-01 (Subscription)
      base_url: https://api.minimax.io/v1
      limit: 0
      reserved_tokens: 0
      supports_streaming: true
      supports_image_generation: true
      generation_type: sync
      pricing:
        is_subscription: true
    - id: minimax-m2.7
      name: MiniMax M2.7
      limit: 204800
      reserved_tokens: 8192
      supports_streaming: true
      supports_reasoning: true
      supports_include_reasoning: true
      supports_custom_temperature: true
      supports_image_generation: true
      supports_video_generation: true
      pricing:
        input: 0.3
        output: 1.2
        cache_write: 0.375
        cache_read: 0.03
    - id: minimax-m2.7-coding-plan
      name: MiniMax M2.7 (Subscription)
      limit: 204800
      reserved_tokens: 8192
      supports_streaming: true
      supports_reasoning: true
      supports_include_reasoning: true
      supports_custom_temperature: true
      pricing:
        is_subscription: true
    - id: minimax-m2.7-highspeed
      name: MiniMax M2.7 HighSpeed
      limit: 204800
      reserved_tokens: 8192
      supports_streaming: true
      supports_reasoning: true
      supports_include_reasoning: true
      supports_custom_temperature: true
      supports_image_generation: true
      supports_video_generation: true
      pricing:
        input: 0.6
        output: 2.4
        cache_write: 0.375
        cache_read: 0.03
    - id: minimax-m2.7-highspeed-coding-plan
      name: MiniMax M2.7 HighSpeed (Subscription)
      limit: 204800
      reserved_tokens: 8192
      supports_streaming: true
      supports_reasoning: true
      supports_include_reasoning: true
      supports_custom_temperature: true
      pricing:
        is_subscription: true
    - id: minimax-m3
      # Frontier multimodal coding model with a 1M context window. M3 has no
      # separate "-highspeed" variant (those stop at M2.x). wire_id pins the
      # exact upstream model string: MiniMax's API expects the PascalCase id,
      # not the lowercase catalog id.
      wire_id: MiniMax-M3
      name: MiniMax M3
      limit: 1000000
      # 128000 output tokens on M3's 1M context: fits a one-shot ~200 KB file
      # write (~57K tokens) plus reasoning headroom. 8192 capped writes at ~30 KB.
      reserved_tokens: 128000
      supports_streaming: true
      supports_reasoning: true
      supports_include_reasoning: true
      supports_custom_temperature: true
      supports_image_generation: true
      supports_video_generation: true
      # supports_tool_search is OFF: empirically, M3's /anthropic/v1 endpoint
      # validates EVERY tool as a function (name + parameters) and rejects the
      # parameterless tool_search server tool with 400 "function name or
      # parameters is empty (2013)" — confirmed by logging the outgoing tools
      # (the only rejected entry was {type:tool_search, name:"", properties:0}).
      # That's the irreducible shape of a tool-search helper, so deferred tooling
      # is not usable via this endpoint. (M3's OpenAI-compatible endpoint documents
      # {"type":"tool_search"}, so a future option is routing M3 through that.)
      pricing:
        # Pay-as-you-go standard tier. cache_write is unpublished by MiniMax;
        # 1.5 mirrors the M2.7 1.25x-input ratio (0.3 -> 0.375). Confirm later.
        input: 1.2
        output: 4.8
        cache_write: 1.5
        cache_read: 0.24
    - id: minimax-m3-coding-plan
      wire_id: MiniMax-M3
      name: MiniMax M3 (Subscription)
      limit: 1000000
      # See minimax-m3 above: 128000 enables one-shot ~200 KB writes + reasoning.
      reserved_tokens: 128000
      supports_streaming: true
      supports_reasoning: true
      supports_include_reasoning: true
      supports_custom_temperature: true
      # Same wire model + endpoint as minimax-m3 above: tool_search is rejected
      # with 2013, so supports_tool_search stays OFF here too.
      default_selection: true
      pricing:
        is_subscription: true
sync:
    pinned:
        - hailuo-2.3
        - hailuo-2.3-coding-plan
        - image-01
        - image-01-coding-plan
        - minimax-m2.7
        - minimax-m2.7-coding-plan
        - minimax-m2.7-highspeed
        - minimax-m2.7-highspeed-coding-plan
        - minimax-m3
        - minimax-m3-coding-plan
    excluded:
        - MiniMax-M2
        - MiniMax-M2.1
        - MiniMax-M2.5
        - MiniMax-M2.5-highspeed
        - MiniMax-M2.7
        - MiniMax-M2.7-highspeed
        - MiniMax-M3
